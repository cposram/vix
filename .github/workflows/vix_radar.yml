name: VIX-Radar

on:
  schedule:
    # 這裡設定每 30 分鐘執行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:      # 讓你可以隨時手動點擊按鈕測試

# 【修改點 1】將權限改為 write，確保寫入網頁時不會被 GitHub 安全機制擋下
permissions:
  contents: write 

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run VIX Radar
        env:
          # 【修改點 2】把剛才存入保險箱的 MY_GITHUB_TOKEN 傳遞給 Python 程式
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }} 
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vix.py
