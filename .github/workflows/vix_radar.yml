name: VIX-Radar

on:
  schedule:
    # 這裡設定每 30 分鐘執行一次
    - cron: '*/30 * * * *'
  workflow_dispatch:      # 讓你可以隨時手動點擊按鈕測試

permissions:
  contents: read

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run VIX Radar
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vix.py
